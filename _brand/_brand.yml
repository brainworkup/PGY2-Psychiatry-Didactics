meta:
  name: Joey W. Trampush, Ph.D.
  link:
    home: https://brainworkup.org
    github: https://github.com/brainworkup
logo:
  images:
    light:
      path: /logos/logo.png
      alt: "Joey W. Trampush logo"
    dark:
      path: /logos/logo_black.jpg
      alt: "Joey W. Trampush logo"
  small:
    light: light
    dark: dark
  medium:
    light: light
    dark: dark
  large:
    light: light
    dark: dark
color:
  background:
    dark: "#333333"
    light: "#fafafa"
  foreground:
    dark: "#fafafa"
    light: "#333333"
  dark:
    dark: "#333333"
    light: "#fafafa"
  light:
    dark: "#fafafa"
    light: "#333333"
typography:
  fonts:
    - family: Alegreya Sans
      # source: bunny
      source: google
    - family: Fira Code
      # source: bunny
      source: google
  base: Alegreya Sans
  headings: Alegreya Sans
  monospace: Fira Code
  link:
    color: foreground
defaults:
  bootstrap:
    defaults:
      theme: mcanouil
      tooltip-color: $background
      tooltip-bg: $foreground
      btn-close-color: $foreground
      # Navbar (complements metadata "background: dark")
      navbar-bg: $dark
      navbar-fg: $light
      navbar-hl: $light
      # Footer
      footer-bg: $dark
      footer-fg: $light
      footer-hl: $light
      # Sidebar (complements metadata "background: dark")
      sidebar-bg: $dark
      sidebar-fg: $light
      sidebar-hl: $light
    rules: |
      // CSS Rules
